<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin:0; width:1000px; height:1500px; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; background:#F5F0EB; }
  .card { width:1000px; height:1500px; position:relative; }
  .header { position:absolute; top:0; left:0; right:0; height:520px; background:#1A3C34; padding:50px 60px; box-sizing:border-box; }
  .brand { color:#D4914B; font-size:26px; font-weight:700; letter-spacing:4px; text-transform:uppercase; }
  .title { color:#FFF; font-size:52px; font-weight:900; line-height:1.15; margin-top:16px; }
  .price-badge { display:inline-block; background:#D4914B; color:white; font-size:26px; font-weight:700; padding:14px 30px; border-radius:50px; margin-top:24px; }
  .product-area { position:absolute; top:400px; left:60px; right:60px; }
  .product-area img { width:880px; height:760px; object-fit:contain; border-radius:24px; background:white; box-shadow:0 8px 32px rgba(0,0,0,0.12); }
  .info { position:absolute; bottom:80px; left:60px; right:60px; }
  .features { display:flex; flex-wrap:wrap; gap:12px 24px; margin-bottom:28px; }
  .feat { font-size:20px; color:#333; background:white; padding:10px 20px; border-radius:8px; font-weight:600; }
  .cta-btn { display:block; width:100%; background:#D4914B; color:white; text-align:center; font-size:26px; font-weight:700; padding:22px; border-radius:14px; box-sizing:border-box; letter-spacing:1px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="brand">SmartPetGuide</div>
    <div class="title">How to Clean a Cat<br>Water Fountain</div>
    <div class="price-badge">Step-by-Step Guide</div>
  </div>
  <div class="product-area">
    <img src="file:///C:/Users/Administrator/smartpetguide/pins/images/pioneer-pet-raindrop.jpg" alt="Pioneer Pet Raindrop Fountain">
  </div>
  <div class="info">
    <div class="features">
      <span class="feat">7-10 Day Schedule</span>
      <span class="feat">Pump Deep Clean</span>
      <span class="feat">5 Common Mistakes</span>
      <span class="feat">Steel vs Plastic</span>
    </div>
    <div class="cta-btn">Full Guide on SmartPetGuide</div>
  </div>
</div>
</body>
</html>
