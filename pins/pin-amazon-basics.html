<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    width: 1000px;
    height: 1500px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    background: #F5F0EB;
  }
  .card {
    width: 1000px;
    height: 1500px;
    position: relative;
  }
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 520px;
    background: #1A3C34;
    padding: 50px 60px;
    box-sizing: border-box;
  }
  .brand {
    color: #D4914B;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .title {
    color: #FFFFFF;
    font-size: 54px;
    font-weight: 900;
    line-height: 1.15;
    margin-top: 16px;
  }
  .price-badge {
    display: inline-block;
    background: #D4914B;
    color: white;
    font-size: 26px;
    font-weight: 700;
    padding: 14px 30px;
    border-radius: 50px;
    margin-top: 24px;
  }
  .product-area {
    position: absolute;
    top: 400px;
    left: 60px;
    right: 60px;
  }
  .product-area img {
    width: 880px;
    height: 760px;
    object-fit: contain;
    border-radius: 24px;
    background: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .info {
    position: absolute;
    bottom: 80px;
    left: 60px;
    right: 60px;
  }
  .vs-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
  }
  .main-price {
    font-size: 68px;
    font-weight: 900;
    color: #1A3C34;
    line-height: 1;
  }
  .main-price small {
    display: block;
    font-size: 22px;
    font-weight: 400;
    color: #777;
    margin-top: 2px;
  }
  .savings {
    background: #1A3C34;
    color: #D4914B;
    font-size: 20px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 8px;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 24px;
    margin-bottom: 28px;
  }
  .feat {
    font-size: 20px;
    color: #333;
    background: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
  }
  .cta-btn {
    display: block;
    width: 100%;
    background: #D4914B;
    color: white;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    padding: 22px;
    border-radius: 14px;
    box-sizing: border-box;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="brand">Amazon Basics</div>
    <div class="title">Self-Cleaning Litter Box<br>Review 2026</div>
    <div class="price-badge">$209 - First Look</div>
  </div>
  <div class="product-area">
    <img src="https://m.media-amazon.com/images/I/511qt2xxHTL._AC_SL1500_.jpg" alt="Amazon Basics Self-Cleaning Cat Litter Box">
  </div>
  <div class="info">
    <div class="vs-row">
      <div class="main-price">
        $209
        <small>vs $699 Litter-Robot 4</small>
      </div>
      <div class="savings">Save $490</div>
    </div>
    <div class="features">
      <span class="feat">15 Safety Sensors</span>
      <span class="feat">Ultra Quiet 40dB</span>
      <span class="feat">Deodorizing Spray</span>
      <span class="feat">Washable Liner</span>
    </div>
    <div class="cta-btn">Full Review on SmartPetGuide</div>
  </div>
</div>
</body>
</html>
